<svg viewBox="0 0 160 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Elegant curved spine line -->
  <path d="M 95 30 Q 110 80, 105 120 Q 100 160, 95 200"
        stroke="#1B3A6B" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Vertebrae - rounded/organic shapes -->
  <!-- Top vertebra (C1) - lime green -->
  <ellipse cx="70" cy="35" rx="16" ry="18" fill="#B8E839" opacity="0.95"/>

  <!-- C2-C4 vertebrae - transitioning blues -->
  <ellipse cx="65" cy="60" rx="14" ry="16" fill="#5B9BD5" opacity="0.9"/>
  <ellipse cx="62" cy="82" rx="14" ry="16" fill="#4A8DD1" opacity="0.9"/>
  <ellipse cx="60" cy="104" rx="14" ry="16" fill="#3D7EC8" opacity="0.9"/>

  <!-- Mid-spine vertebrae - darker blues -->
  <ellipse cx="60" cy="126" rx="15" ry="17" fill="#2E68B4" opacity="0.95"/>
  <ellipse cx="62" cy="148" rx="15" ry="17" fill="#1B3A6B" opacity="1"/>
  <ellipse cx="65" cy="170" rx="15" ry="17" fill="#2E68B4" opacity="0.95"/>

  <!-- Lower vertebrae - orange gradient -->
  <ellipse cx="70" cy="192" rx="14" ry="16" fill="#E8572A" opacity="0.9"/>
  <ellipse cx="76" cy="210" rx="12" ry="14" fill="#C94A20" opacity="0.95"/>

  <!-- Subtle connection elements between vertebrae -->
  <line x1="75" y1="53" x2="75" y2="58" stroke="#5B9BD5" stroke-width="1.5" opacity="0.4"/>
  <line x1="72" y1="75" x2="72" y2="80" stroke="#4A8DD1" stroke-width="1.5" opacity="0.4"/>
  <line x1="70" y1="97" x2="70" y2="102" stroke="#3D7EC8" stroke-width="1.5" opacity="0.4"/>
  <line x1="70" y1="119" x2="70" y2="124" stroke="#2E68B4" stroke-width="1.5" opacity="0.4"/>
  <line x1="72" y1="141" x2="72" y2="146" stroke="#1B3A6B" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="163" x2="75" y2="168" stroke="#2E68B4" stroke-width="1.5" opacity="0.4"/>
  <line x1="78" y1="185" x2="78" y2="190" stroke="#E8572A" stroke-width="1.5" opacity="0.4"/>

  <!-- Wellness indicator rays from top -->
  <g stroke="#E8572A" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="45" y1="20" x2="35" y2="15"/>
    <line x1="40" y1="35" x2="28" y2="32"/>
    <line x1="48" y1="48" x2="40" y2="55"/>
  </g>

  <!-- Right side accent curve - subtle -->
  <path d="M 115 45 Q 125 120, 118 195"
        stroke="#E8572A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>