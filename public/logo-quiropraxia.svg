<svg viewBox="0 0 195 345" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Spine main gradient: gold → blue → gold → navy -->
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5A31E"/>
      <stop offset="36%"  stop-color="#3D82D8"/>
      <stop offset="64%"  stop-color="#F5A31E"/>
      <stop offset="100%" stop-color="#1A3B6D"/>
    </linearGradient>

    <!-- Spine glow (wider, softer) -->
    <linearGradient id="spineGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFCC50"/>
      <stop offset="36%"  stop-color="#78B8F8"/>
      <stop offset="64%"  stop-color="#FFCC50"/>
      <stop offset="100%" stop-color="#4A70C0"/>
    </linearGradient>

    <!-- Radial gradients for vertebrae (light centre → darker edge = 3-D look) -->
    <radialGradient id="rg-orange" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFC850"/>
      <stop offset="100%" stop-color="#D86C08"/>
    </radialGradient>

    <radialGradient id="rg-blue" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#80C8FF"/>
      <stop offset="100%" stop-color="#1E68D8"/>
    </radialGradient>

    <radialGradient id="rg-midblue" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#60A8E8"/>
      <stop offset="100%" stop-color="#1858C0"/>
    </radialGradient>

    <radialGradient id="rg-navy" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#3870C8"/>
      <stop offset="100%" stop-color="#0E2858"/>
    </radialGradient>
  </defs>

  <!-- ── SPINE ── -->
  <path d="M 140 15 Q 166 110, 148 210 Q 130 305, 143 335"
        stroke="url(#spineGlow)" stroke-width="30" fill="none"
        stroke-linecap="round" opacity="0.14"/>
  <path d="M 140 15 Q 166 110, 148 210 Q 130 305, 143 335"
        stroke="url(#spineGlow)" stroke-width="18" fill="none"
        stroke-linecap="round" opacity="0.22"/>
  <path d="M 140 15 Q 166 110, 148 210 Q 130 305, 143 335"
        stroke="url(#spineGrad)" stroke-width="9" fill="none"
        stroke-linecap="round"/>
  <!-- Thin gloss highlight -->
  <path d="M 143 17 Q 169 112, 151 212 Q 133 307, 146 337"
        stroke="rgba(255,225,140,0.38)" stroke-width="2.5" fill="none"
        stroke-linecap="round"/>

  <!-- ── VERTEBRAE (petal shapes pointing right toward the spine) ── -->

  <!-- GROUP 1 – ORANGE – cervical -->
  <path d="M 138,38  C 107,24  25,24  25,38  C 25,52  107,52  138,38  Z" fill="url(#rg-orange)"/>
  <path d="M 146,68  C 115,55  32,55  32,68  C 32,81  115,81  146,68  Z" fill="url(#rg-orange)"/>
  <path d="M 152,98  C 121,85  38,85  38,98  C 38,111 121,111 152,98  Z" fill="url(#rg-orange)"/>

  <!-- GROUP 2 – BLUE – thoracic -->
  <path d="M 157,127 C 126,115 44,115 44,127 C 44,139 126,139 157,127 Z" fill="url(#rg-blue)"/>
  <path d="M 158,155 C 128,143 49,143 49,155 C 49,167 128,167 158,155 Z" fill="url(#rg-blue)"/>
  <path d="M 158,182 C 129,171 53,171 53,182 C 53,193 129,193 158,182 Z" fill="url(#rg-blue)"/>

  <!-- GROUP 3 – ORANGE – lumbar -->
  <path d="M 155,207 C 129,196 58,196 58,207 C 58,218 129,218 155,207 Z" fill="url(#rg-orange)"/>
  <path d="M 152,230 C 128,220 63,220 63,230 C 63,240 128,240 152,230 Z" fill="url(#rg-orange)"/>
  <path d="M 148,252 C 126,242 68,242 68,252 C 68,262 126,262 148,252 Z" fill="url(#rg-orange)"/>

  <!-- GROUP 4 – BLUE → NAVY – sacral -->
  <path d="M 143,272 C 125,263 75,263 75,272 C 75,281 125,281 143,272 Z" fill="url(#rg-blue)"/>
  <path d="M 138,292 C 124,284 85,284 85,292 C 85,300 124,300 138,292 Z" fill="url(#rg-midblue)"/>
  <path d="M 134,315 C 125,309 100,309 100,315 C 100,321 125,321 134,315 Z" fill="url(#rg-navy)"/>
</svg>
