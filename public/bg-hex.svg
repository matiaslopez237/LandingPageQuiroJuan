<svg xmlns="http://www.w3.org/2000/svg" width="140" height="250">
  <!-- Hex grid tile (heropatterns formula, scaled 2.5x) -->
  <!-- Upper hexagon outline -->
  <path d="M70 165 L0 125 L0 40 L70 0 L140 40 L140 125 L70 165 L70 250"
        fill="none" stroke="#4A8DD1" stroke-opacity="0.09" stroke-width="1.2"/>
  <!-- Lower staggered hexagon outline -->
  <path d="M70 0 L70 85 L0 125 L0 210 L70 250 L140 210 L140 125 L70 85"
        fill="none" stroke="#4A8DD1" stroke-opacity="0.09" stroke-width="1.2"/>
  <!-- Node dots at vertices -->
  <circle cx="70"  cy="0"   r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="140" cy="40"  r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="140" cy="125" r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="70"  cy="165" r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="0"   cy="125" r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="0"   cy="40"  r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="70"  cy="85"  r="2"   fill="#4A8DD1" opacity="0.14"/>
  <circle cx="0"   cy="210" r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="140" cy="210" r="2.5" fill="#4A8DD1" opacity="0.18"/>
  <circle cx="70"  cy="250" r="2.5" fill="#4A8DD1" opacity="0.18"/>
</svg>
