<svg viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5AA0;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main spine curve - elegant and flowing -->
  <path d="M 120 30 Q 135 85, 130 150 Q 125 210, 120 280"
        stroke="url(#spineGradient)"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"
        filter="url(#softShadow)"/>

  <!-- Vertebrae - modern rounded design -->
  <!-- Top vertebra - accent green -->
  <ellipse cx="95" cy="40" rx="14" ry="16" fill="#A8D949" opacity="0.95"/>
  <ellipse cx="145" cy="40" rx="14" ry="16" fill="#A8D949" opacity="0.95"/>

  <!-- Upper cervical - light blue -->
  <ellipse cx="92" cy="65" rx="13" ry="15" fill="#5B9BD5" opacity="0.9"/>
  <ellipse cx="148" cy="65" rx="13" ry="15" fill="#5B9BD5" opacity="0.9"/>

  <!-- Cervical - mid blue -->
  <ellipse cx="90" cy="88" rx="13" ry="15" fill="#4A8DD1" opacity="0.9"/>
  <ellipse cx="150" cy="88" rx="13" ry="15" fill="#4A8DD1" opacity="0.9"/>

  <!-- Mid-spine - darker blue -->
  <ellipse cx="88" cy="111" rx="13" ry="15" fill="#3D7EC8" opacity="0.9"/>
  <ellipse cx="152" cy="111" rx="13" ry="15" fill="#3D7EC8" opacity="0.9"/>

  <ellipse cx="87" cy="134" rx="14" ry="16" fill="#2E68B4" opacity="0.95"/>
  <ellipse cx="153" cy="134" rx="14" ry="16" fill="#2E68B4" opacity="0.95"/>

  <!-- Lower mid-spine - deep blue -->
  <ellipse cx="87" cy="157" rx="14" ry="16" fill="#1B3A6B" opacity="1"/>
  <ellipse cx="153" cy="157" rx="14" ry="16" fill="#1B3A6B" opacity="1"/>

  <!-- Lumbar - returning to lighter blue -->
  <ellipse cx="88" cy="180" rx="14" ry="16" fill="#2E68B4" opacity="0.95"/>
  <ellipse cx="152" cy="180" rx="14" ry="16" fill="#2E68B4" opacity="0.95"/>

  <!-- Lower lumbar - accent green -->
  <ellipse cx="92" cy="203" rx="13" ry="15" fill="#A8D949" opacity="0.9"/>
  <ellipse cx="148" cy="203" rx="13" ry="15" fill="#A8D949" opacity="0.9"/>

  <!-- Sacral accent -->
  <ellipse cx="95" cy="225" rx="12" ry="14" fill="#A8D949" opacity="0.85"/>
  <ellipse cx="145" cy="225" rx="12" ry="14" fill="#A8D949" opacity="0.85"/>

  <!-- Text: AXIAL -->
  <text x="120" y="270"
        font-family="'Trebuchet MS', 'Arial', sans-serif"
        font-size="48"
        font-weight="700"
        text-anchor="middle"
        fill="#1B3A6B"
        letter-spacing="-1">AXIAL</text>

  <!-- Subtitle: QUIROPRAXIA -->
  <text x="120" y="305"
        font-family="'Trebuchet MS', 'Arial', sans-serif"
        font-size="11"
        font-weight="600"
        text-anchor="middle"
        fill="#2D9CDB"
        letter-spacing="2"
        opacity="0.85">QUIROPRAXIA</text>
</svg>